name: JMeter Performance Test

on:
  workflow_dispatch:
    inputs:
      threads:
        description: "Number of users (threads)"
        required: true
        default: "100"
      rampup:
        description: "Ramp-up period (seconds)"
        required: true
        default: "100"

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Download JMeter
        run: |
          wget https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter
          chmod +x jmeter/bin/jmeter

      - name: Debug project structure
        run: |
          echo "==== ROOT ===="
          ls -l
          echo "==== scripts ===="
          ls -l scripts || true
          echo "==== config ===="
          ls -l config || true

      - name: Run JMeter Test (safe mode)
        continue-on-error: true
        run: |
          rm -rf results
          mkdir -p results

          jmeter/bin/jmeter -n \
            -t scripts/ReqRes_Auth_Flow_Test_Plan.jmx \
            -q config/env.properties \
            -Jthreads=${{ github.event.inputs.threads }} \
            -Jrampup=${{ github.event.inputs.rampup }} \
            -l results/result.jtl \
            -j results/jmeter.log

      - name: Generate HTML Report
        run: |
          jmeter/bin/jmeter -g results/result.jtl \
            -o results/html-report

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: results/html-report

      - name: Upload JMeter Log
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-log
          path: results/jmeter.log
``
